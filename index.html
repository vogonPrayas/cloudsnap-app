<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudSnap - Upload Your Images</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>☁️ CloudSnap</h1>
            <p>Cloud-Native Image Sharing Platform for everyone</p>
        </header>

        <nav>
            <a href="index.html" class="active">Upload</a>
            <a href="gallery.html">Gallery</a>
        </nav>

        <main>
            <div class="upload-card">
                <h2>Upload Your Image</h2>
                
                <form id="uploadForm">
                    <div class="form-group">
                        <label for="imageTitle">Image Title</label>
                        <input 
                            type="text" 
                            id="imageTitle" 
                            placeholder="Enter a title for your image"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="imageFile">Choose Image</label>
                        <input 
                            type="file" 
                            id="imageFile" 
                            accept="image/jpeg,image/jpg,image/png"
                            required
                        >
                        <small>Supported formats: JPG, PNG (Max 5MB)</small>
                    </div>

                    <div id="preview" class="preview-container" style="display: none;">
                        <img id="previewImage" alt="Preview">
                    </div>

                    <button type="submit" id="uploadBtn" class="btn-primary">
                        📤 Upload Image
                    </button>
                </form>

                <div id="status" class="status-message" style="display: none;"></div>
                <div id="loader" class="loader" style="display: none;"></div>
            </div>
        </main>

        <footer>
            <p>CloudSnap © 2024 | Built with Azure Cloud Services</p>
            <p><small>Student: Prayas Gautam (B00971722) | Module: COM682</small></p>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
